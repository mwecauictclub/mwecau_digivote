<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWECAU Election Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">MWECAU Election Platform</h1>
        <div id="auth" class="mb-4">
            <h2 class="text-xl font-semibold">Login</h2>
            <input id="reg_number" type="text" placeholder="Registration Number" class="border p-2 mr-2">
            <input id="password" type="password" placeholder="Password" class="border p-2 mr-2">
            <button onclick="login()" class="bg-blue-500 text-white p-2 rounded">Login</button>
        </div>
        <div id="elections" class="mb-4">
            <h2 class="text-xl font-semibold">Elections</h2>
            <ul id="election-list" class="list-disc pl-5"></ul>
        </div>
        <div id="vote" class="mb-4">
            <h2 class="text-xl font-semibold">Vote</h2>
            <select id="election-id" class="border p-2 mr-2"></select>
            <div id="positions"></div>
        </div>
        <div id="results" class="mb-4">
            <h2 class="text-xl font-semibold">Results</h2>
            <select id="result-election-id" class="border p-2 mr-2"></select>
            <button onclick="getResults()" class="bg-green-500 text-white p-2 rounded">View Results</button>
            <div id="results-output"></div>
        </div>
    </div>
    <script>
        let accessToken = null;

        async function login() {
            const regNumber = document.getElementById('reg_number').value;
            const password = document.getElementById('password').value;
            const response = await fetch('http://localhost:8000/api/core/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ registration_number: regNumber, password })
            });
            const data = await response.json();
            if (response.ok) {
                accessToken = data.access;
                alert('Login successful');
                loadElections();
            } else {
                alert(data.error);
            }
        }

        async function loadElections() {
            const response = await fetch('http://localhost:8000/api/election/list/', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const elections = await response.json();
            const electionList = document.getElementById('election-list');
            const electionSelect = document.getElementById('election-id');
            const resultSelect = document.getElementById('result-election-id');
            electionList.innerHTML = '';
            electionSelect.innerHTML = '';
            resultSelect.innerHTML = '';
            elections.forEach(e => {
                electionList.innerHTML += `<li>${e.title} (Active: ${e.is_active})</li>`;
                electionSelect.innerHTML += `<option value="${e.id}">${e.title}</option>`;
                resultSelect.innerHTML += `<option value="${e.id}">${e.title}</option>`;
            });
        }

        async function loadVote(electionId) {
            const response = await fetch(`http://localhost:8000/api/election/vote/${electionId}`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            const positionsDiv = document.getElementById('positions');
            positionsDiv.innerHTML = '';
            data.positions.forEach(pos => {
                let html = `<h3>${pos.position.title}</h3>`;
                html += '<ul>';
                pos.candidates.forEach(c => {
                    html += `<li>
                        ${c.user_name} 
                        <img src="${c.image_url || ''}" alt="Candidate" width="50" class="inline">
                        <button onclick="vote(${data.election_id}, ${pos.position.election_level.id}, ${c.id}, '${pos.token?.token || ''}')">
                            Vote
                        </button>
                    </li>`;
                });
                html += '</ul>';
                positionsDiv.innerHTML += html;
            });
        }

        async function vote(electionId, levelId, candidateId, token) {
            const response = await fetch('http://localhost:8000/api/election/vote/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ election_id: electionId, level_id: levelId, candidate_id: candidateId, token })
            });
            const data = await response.json();
            alert(response.ok ? data.message : data.error);
        }

        async function getResults() {
            const electionId = document.getElementById('result-election-id').value;
            const response = await fetch(`http://localhost:8000/api/election/results/${electionId}/`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            const output = document.getElementById('results-output');
            output.innerHTML = '';
            data.forEach(pos => {
                output.innerHTML += `<h3>${pos.position_title}</h3><ul>`;
                pos.candidates.forEach(c => {
                    output.innerHTML += `<li>${c.name}: ${c.vote_count} votes (${c.vote_percentage.toFixed(2)}%)</li>`;
                });
                output.innerHTML += '</ul>';
            });
        }

        document.getElementById('election-id').addEventListener('change', e => loadVote(e.target.value));
    </script>
</body>
</html>
