# Installing Enviroment Depepndecy For Package, including pip packages using pyenv

# Install pyenv
curl https://pyenv.run | bash

# Add pyenv to shell (if using bash/zsh, add these lines to ~/.bashrc or ~/.zshrc)
export PATH="$HOME/.pyenv/bin:$PATH"
eval "$(pyenv init -)"
eval "$(pyenv virtualenv-init -)"

# Install Python 3.12.x (latest stable)
pyenv install 3.12.5

# Set Python version for your project
cd your_django_project
pyenv local 3.12.5


# Installing pipx and poetry for the project where pipx from python3 which are installed, and pipx used for installing poetry 
# Install pipx
python3 -m pip install --user pipx
python3 -m pipx ensurepath

# Install Poetry via Pipx (isolated installation)
pipx install poetry

# Poetry initialization and installing project dependecy
# Initialize poetry in your existing project
poetry init

# Activate poetry environment
poetry env use 3.12

# Add dependencies
poetry add django@^5.2
poetry add djangorestframework
poetry add djangorestframework-simplejwt
poetry add celery
poetry add redis
poetry add django-celery-email
poetry add python-dotenv

Addition for the package and compatibility check
poetry add celery@^5.4

Also For latest redis broker
poetry add redis



Running a Project
# Activate environment
poetry shell

# Run Django
python manage.py runserver

# Run Celery
celery -A your_project worker -l info
