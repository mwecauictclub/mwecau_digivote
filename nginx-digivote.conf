server {
    listen 81;
    server_name 159.65.119.182;

    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/digivote-access.log;
    error_log /var/log/nginx/digivote-error.log;

    # Static files
    location /static/ {
        alias /var/www/mwecau_digivote/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /var/www/mwecau_digivote/src/media/;
        expires 7d;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://unix:/var/www/mwecau_digivote/src/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
}
